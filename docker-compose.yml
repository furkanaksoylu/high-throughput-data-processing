services:
  postgres:
    image: postgres:16
    env_file: .env
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redisdata:/data
    command:
      ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  migrate:
    build: .
    env_file: .env
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # CI gate — only active when started with: docker compose --profile test up --build
  # If test-runner exits non-zero, api and worker will NOT start.

  postgres-test:
    image: postgres:16
    profiles: [test]
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  redis-test:
    image: redis:7
    profiles: [test]
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  migrate-test:
    build: .
    profiles: [test]
    command: npx prisma migrate deploy --schema=prisma/schema.prisma
    environment:
      DATABASE_URL: postgresql://test:test@postgres-test:5432/test
    depends_on:
      postgres-test:
        condition: service_healthy
    restart: "no"

  test-runner:
    build:
      context: .
      target: build
    profiles: [test]
    command: >
      sh -c "
        mkdir -p /tmp/test-storage &&
        pnpm test:integration -- --reporter=verbose
      "
    environment:
      NODE_ENV: test
      RUN_INTEGRATION_TESTS: "1"
      DB_HOST: postgres-test
      DB_PORT: "5432"
      DB_USER: test
      DB_PASS: test
      DB_NAME: test
      DB_POOL_MAX: "5"
      DATABASE_URL: postgresql://test:test@postgres-test:5432/test
      REDIS_HOST: redis-test
      REDIS_PORT: "6379"
      STORAGE_DIR: /tmp/test-storage
      BULK_QUEUE_NAME: bulk-ci
      BULK_WORKER_CONCURRENCY: "2"
      JOB_RECOVERY_EVERY_MS: "5000"
      STALE_JOB_TIMEOUT_MS: "60000"
      JOB_PROGRESS_EVERY: "100"
      IMPORT_FLUSH_SIZE: "100"
      IMPORT_MAX_FILE_BYTES: "104857600"
      IMPORT_FETCH_TIMEOUT_MS: "10000"
      EXPORT_FETCH_BATCH_SIZE: "100"
      JWT_SECRET: ci-test-jwt-secret-not-for-production
      JWT_EXPIRES_IN: "1h"
      SALT_ROUNDS: "4"
      SUPER_ADMIN_EMAIL: superadmin@ci.example.com
      SUPER_ADMIN_NAME: CI Admin
      SUPER_ADMIN_PASSWORD: CiTestPass123!
      METRICS_ENABLED: "false"
      DOCS_ENABLED: "false"
      AUTH_RATE_LIMIT_MAX: "100000"
    depends_on:
      migrate-test:
        condition: service_completed_successfully
      redis-test:
        condition: service_healthy
    restart: "no"

  # Application

  api:
    build: .
    env_file: .env
    ports:
      - "${PORT}:3000"
    volumes:
      - appdata:/data
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      test-runner:
        condition: service_completed_successfully
        required: false

  worker:
    build: .
    env_file: .env
    command: ["node", "dist/interfaces/worker/index.js"]
    ports:
      - "${WORKER_METRICS_PORT:-9091}:9091"
    volumes:
      - appdata:/data
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_started
      test-runner:
        condition: service_completed_successfully
        required: false

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus



volumes:
  pgdata:
  redisdata:
  appdata:
  prometheusdata:
  grafanadata:
