global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ['api:3000']
    metrics_path: /metrics
    # If METRICS_TOKEN is set in your .env, uncomment and set the token here:
    # authorization:
    #   credentials: <your-metrics-token>

  - job_name: worker
    static_configs:
      - targets: ['worker:9091']
    metrics_path: /metrics
